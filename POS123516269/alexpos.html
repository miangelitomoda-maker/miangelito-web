<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Mi Angelito Moda · POS</title>
  <style>
    :root{
      --kpH:320px;
      --bg:#f6f7fb;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:rgba(15,23,42,.10);
      --shadow:0 10px 30px rgba(15,23,42,.08);
      --radius:18px;
      --radius2:14px;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text)}
    .wrap{max-width:520px;margin:0 auto;padding:12px 12px calc(var(--kpH) + env(safe-area-inset-bottom));}
    .top{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:12px;
      box-shadow:none;
    }
    .row{display:flex;gap:10px;align-items:center}
    .ttl{font-weight:950;font-size:18px;line-height:1}
    .pill{
      margin-left:auto;
      display:inline-flex;align-items:center;gap:8px;
      border:1px solid var(--line);border-radius:999px;
      padding:8px 10px;background:#fff;font-size:11px;color:var(--muted);
      white-space:nowrap;
    }
    .dot{width:8px;height:8px;border-radius:999px;background:#94a3b8}
    .dot.ok{background:#22c55e}
    .dot.bad{background:#ef4444}

    /* Save vertical space: hide title + connection pill (keep nodes for JS) */
    .connRow{display:none !important}

    .actionBar{
      margin-top:10px;
      display:grid;
      grid-template-columns:1fr 1fr 1.4fr;
      gap:10px;
    
      display:none !important;
    }
    .abtn{
      height:48px;border-radius:16px;
      border:1px solid var(--line);
      background:#fff;
      font-weight:900;font-size:15px;
      display:flex;align-items:center;justify-content:center;
      user-select:none;-webkit-tap-highlight-color:transparent;
      cursor:pointer;
    }
    .abtn.primary{background:#111827;color:#fff;border-color:#111827}
    .abtn:active{transform:translateY(1px)}

    .kpis{display:grid;grid-template-columns:1.2fr 1fr;gap:10px;margin-top:10px}
    .kpi{background:#fff;border:1px solid var(--line);border-radius:var(--radius2);padding:12px}
    .kpi .k{font-size:12px;color:var(--muted)}
    .kpi .v{font-size:22px;font-weight:950;margin-top:6px;font-variant-numeric:tabular-nums}
    .kpiRight .v{display:flex;align-items:center;gap:10px}
    /* pieces + share bill */
    .kpiRight .v{justify-content:space-between;gap:8px}
    .piecesPill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      height:34px;
      min-width:46px;
      padding:0 10px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      font-size:18px;
      font-weight:950;
      font-variant-numeric:tabular-nums;
      user-select:none;
    }
    .btnShareBill{
      height:34px;
      padding:0 10px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      font-weight:950;
      font-size:12px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      -webkit-tap-highlight-color:transparent;
      user-select:none;
      white-space:nowrap;
    }
    .btnShareBill:active{transform:translateY(1px)}
    .inputDisplay{
      flex:1;height:44px;border-radius:14px;border:1px solid var(--line);
      padding:0 12px;font-size:18px;font-weight:950;
      background:#f8fafc;outline:none;font-variant-numeric:tabular-nums;
    }
    .inputDisplay::placeholder{color:#94a3b8;font-weight:800;font-size:13px}

    .card{
      margin-top:12px;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:12px;
      box-shadow:var(--shadow);
    }

    .mini{font-size:12px;color:var(--muted)}

    .list{margin-top:10px;display:flex;flex-direction:column;gap:8px}
    .it{border:1px solid var(--line);border-radius:16px;background:#fff;padding:10px 10px}
    .lineRow{display:flex;align-items:center;gap:10px;width:100%}
    .lName{font-weight:950;min-width:64px}
    .lMid{color:var(--muted);font-size:12px;font-weight:800;font-variant-numeric:tabular-nums;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .lAmt{font-weight:950;font-variant-numeric:tabular-nums;white-space:nowrap}
    .xDel{width:34px;height:34px;border-radius:12px;border:1px solid var(--line);background:#fff;font-weight:950;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
    .xDel:active{transform:translateY(1px)}

    /* Dock keypad */
    .posDock{
      position:fixed;left:0;right:0;bottom:0;
      max-width:520px;margin:0 auto;
      padding:12px 12px calc(12px + env(safe-area-inset-bottom));
      background:rgba(255,255,255,.92);
      backdrop-filter:saturate(140%) blur(14px);
      border-top:1px solid var(--line);
      z-index:9990;
    }
    .keypad{
      display:grid;
      grid-template-columns: 1.05fr repeat(4, 1fr);
      gap:10px;
    }
    .kbtn{
      height:56px;border-radius:18px;
      border:1px solid var(--line);
      background:#fff;
      font-weight:950;
      font-size:20px;
      -webkit-tap-highlight-color:transparent;
      user-select:none;
      touch-action: manipulation;
    }
    .kbtn:active{transform:translateY(1px)}
    .kbtnOk{background:#111827;color:#fff;border-color:#111827;font-size:18px}
    .toast{
      position:fixed;left:50%;bottom:20px;transform:translateX(-50%);
      background:#111827;color:#fff;padding:10px 12px;border-radius:14px;
      font-weight:900;font-size:13px;z-index:20000;box-shadow:0 16px 40px rgba(2,6,23,.35);
      max-width:92vw;text-align:center;opacity:0;pointer-events:none;
      transition:opacity .18s;
    }
    .toast.show{opacity:1}

    /* Bottom sheet */
    .mask{position:fixed;top:0;left:0;right:0;bottom:var(--kpH);display:none;z-index:9999;align-items:flex-end;justify-content:center;background:rgba(2,6,23,.55);padding:12px}
    .sheet{width:min(520px, 100%);background:#fff;border-radius:22px 22px 0 0;border:1px solid var(--line);box-shadow:0 -20px 60px rgba(2,6,23,.25);overflow:hidden}
    .sheetHead{display:flex;justify-content:space-between;align-items:center;padding:14px 14px 10px;border-bottom:1px solid var(--line)}
    .sheetHead .h{font-weight:950}
    .x{width:42px;height:42px;border-radius:14px;border:1px solid var(--line);background:#fff;font-weight:950}
    .sheetBody{padding:12px 14px}
    .sheetGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
    .field input{width:100%;height:54px;border-radius:16px;border:1px solid var(--line);padding:0 12px;font-size:18px;font-weight:900;outline:none;font-variant-numeric:tabular-nums;}
    .sheetBtns{display:grid;grid-template-columns:1fr 1fr 1.4fr;gap:10px;padding:12px 14px 14px;border-top:1px solid var(--line)}
    .btn{height:52px;border-radius:16px;border:1px solid var(--line);background:#fff;font-weight:900;font-size:15px;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-tap-highlight-color:transparent;cursor:pointer}
    .btn.primary{background:#111827;color:#fff;border-color:#111827}
    .btn:active{transform:translateY(1px)}
  
    .inputDisplayBox{
      flex:1;
      height:44px;
      border-radius:14px;
      border:2px solid rgba(15,23,42,.15);
      background:#ffffff;
      display:flex;
      align-items:center;
      padding:0 12px;
      font-size:18px;
      font-weight:950;
      font-variant-numeric:tabular-nums;
      color:var(--text);
      min-width:0;
    }
    .dockInputBar{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      padding:10px 12px;
      box-shadow:0 10px 30px rgba(15,23,42,.06);
    }
    .dockInputLabel{
      font-size:12px;
      font-weight:950;
      color:var(--muted);
      white-space:nowrap;
    }
    .dockInput{
      flex:1;
      height:44px;
      border-radius:14px;
      border:2px solid rgba(15,23,42,.18);
      padding:0 12px;
      font-size:22px;
      font-weight:950;
      background:#f8fafc;
      outline:none;
      font-variant-numeric:tabular-nums;
      min-width:0;
    }

  
    /* ===== v6.2 KPI as button-like chips ===== */
    .kpis{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:10px;
    }
    .kpi{
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      padding:10px 12px;
      height:56px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      box-shadow:none;
    }
    .kpi .k{font-size:12px;color:var(--muted);font-weight:900;line-height:1}
    .kpi .v{margin-top:6px;font-size:20px;font-weight:950;font-variant-numeric:tabular-nums;line-height:1}
    .kpi .v.big{font-size:20px}

  
    /* Current list scroll area */
    #list{
      max-height: calc(100vh - 360px);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-right: 2px;
    }

  
/* ===== Compact list rows ===== */
.list{
  margin-top:6px;
  display:flex;
  flex-direction:column;
  gap:2px;
}

.it{
  border:1px solid var(--line);
  border-radius:8px;
  background:#fff;
  padding:2px 6px;
  display:flex;
  align-items:center;
  gap:6px;
  min-height:20px;
}

.lineRow{
  display:flex;
  align-items:center;
  gap:8px;
  width:100%;
  font-size:12px;
}

.lName{
  font-weight:800;
  min-width:46px;
}

.lMid{
  color:var(--muted);
  font-size:11px;
  font-weight:700;
  font-variant-numeric:tabular-nums;
  flex:1;
  white-space:nowrap;
}

.lAmt{
  font-weight:900;
  font-size:12px;
  font-variant-numeric:tabular-nums;
  white-space:nowrap;
}

.xDel{
  width:22px;
  height:22px;
  border-radius:6px;
  border:1px solid var(--line);
  background:#fff;
  font-size:11px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.dockMinus{
  width:56px;
  height:44px;
  border-radius:14px;
  border:1px solid var(--line);
  background:#fff;
  font-weight:950;
  font-size:20px;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
  flex:0 0 auto;
}
.dockMinus:active{transform:translateY(1px)}
/* Make + and 回车 larger (use freed space after moving -) */
.kbtnPlus{
  /* Force + to the RIGHT side */
  grid-column: 5;
  grid-row: 2 / span 2; /* taller */
  height:auto;
  font-size:24px;
}
.kbtnOk{
  grid-column: 4 / 6; /* wider */
  font-size:18px;
}


    .kbtnAction{
      font-size:14px;
      font-weight:950;
      letter-spacing:.5px;
    }
    .kbtnPay{
      background:#111827;
      color:#fff;
      border-color:#111827;
      font-size:15px;
    }
    /* Place left action column aligned to 7/4/1/0 column */
    .kbtnUndo{ grid-column:1; grid-row:1; }
    .kbtnClear{ grid-column:1; grid-row:2; }
    .kbtnPay{ grid-column:1; grid-row:3 / span 2; height:auto; }

</style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="row connRow">
        <div class="ttl">Alex · POS</div>
        <div class="pill"><span class="dot" id="dotConn"></span><span id="connLabel">未连接</span></div>
      </div>
<div class="kpis">
        <div class="kpi">
          <div class="k">Total</div>
          <div class="v" id="kTotal">€ 0.00</div>
        </div>
        <div class="kpi kpiRight">
          <div class="k">Piezas</div>
          <div class="v">
            <div class="piecesPill" id="kPieces">0</div>
            <button class="btnShareBill" id="btnShareBill" type="button">Enviar WhatsApp</button>
</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="row" style="justify-content:space-between">
        <div style="font-weight:950">Nota</div>
        <div class="mini">Ver más</div>
      </div>
      <div class="list" id="list"></div>
      <div class="mini" id="emptyHint" style="display:none;margin-top:10px">请添加Artículo</div>
    </div>
  </div>

  <div class="posDock">
      <div class="dockInputBar">
        <div class="dockInputLabel">输入</div>
        <input id="line" class="dockInput" readonly inputmode="none" placeholder="Piezas → 按 + → Precio → 回车" />
        <button class="dockMinus" id="btnMinus" type="button" aria-label="正负号">-</button>
      </div>

    
    <div class="keypad" id="keypad">
      <!-- 左侧单手操作：撤销 / 清空 / 入账（对齐 7/4/1/0 列） -->
      <button class="kbtn kbtnAction kbtnUndo" id="btnUndo" type="button">撤销</button>
      <button class="kbtn" data-k="7">7</button>
      <button class="kbtn" data-k="8">8</button>
      <button class="kbtn" data-k="9">9</button>
      <button class="kbtn" data-k="bk">⌫</button>

      <button class="kbtn kbtnAction kbtnClear" id="btnClear" type="button">清空</button>
      <button class="kbtn" data-k="4">4</button>
      <button class="kbtn" data-k="5">5</button>
      <button class="kbtn" data-k="6">6</button>
      <button class="kbtn kbtnPlus" data-k="plus">+</button>

      <button class="kbtn kbtnPay kbtnAction" id="btnPay" type="button">入账</button>
      <button class="kbtn" data-k="1">1</button>
      <button class="kbtn" data-k="2">2</button>
      <button class="kbtn" data-k="3">3</button>

      <button class="kbtn" data-k="0">0</button>
      <button class="kbtn" data-k="dot">.</button>
      <button class="kbtn kbtnOk" data-k="ok">回车</button>
    </div>

  </div>

  <!-- Cobro Bottom Sheet -->
<div class="mask" id="mask">
    <div class="sheet" role="dialog" aria-modal="true" aria-label="Cobro">
      <div class="sheetHead">
        <div class="h">Cobro</div>
        <button class="x" id="btnClose">✕</button>
      </div>
      <div class="sheetBody">
        <div class="sheetGrid">
          <div class="field">
            <label>应收</label>
            <input id="fTotal" readonly />
          </div>
          <div class="field">
            <label>Pagado（可空：默认刚好付清）</label>
            <input id="fPaid" inputmode="decimal" placeholder="例如 20" />
          </div>
        </div>
        <div class="mini" id="payHint" style="margin-top:10px">Cambio：<b id="fChange">0.00</b> €</div>
      </div>
      <div class="sheetBtns">
        <button class="btn" id="btnExact">刚好付清</button>
        <button class="btn" id="btnSaveNoPrint">保存（不打印）</button>
        <button class="btn primary" id="btnSave">保存</button>
      </div>
    </div>
  </div>

<div class="toast" id="toast"></div>

<script>
(() => {
  // ===== Cloud Sync =====
  const CLOUD_API = "https://www.miangelitomoda.com";
  const POS_API_KEY = "miangelito_2026_secure_key_83927_123516269";
  const SHOP_ID = "miangelito";
  let MACHINE_ID = localStorage.getItem("pos_machine_id") || "A";
  localStorage.setItem("pos_machine_id", MACHINE_ID);

  // Last bill cache (for WhatsApp / printing)
  let lastBill = null;
  try{
    const raw = localStorage.getItem('pos_last_bill');
    if(raw) lastBill = JSON.parse(raw);
  }catch(e){}

  async function syncBillToCloud(payload){
    try{
      await fetch(CLOUD_API + "/api/bill", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-API-KEY": POS_API_KEY
        },
        body: JSON.stringify({
          shop_id: SHOP_ID,
          machine_id: MACHINE_ID,
          billNo: payload.billNo,
          tsMs: Date.now(),
          tsText: payload.ts,
          total: payload.total,
          paid: payload.paid,
          change: payload.change,
          sumQty: payload.sumQty,
          kinds: payload.kinds,
          customerName: payload.customerName || "",
          payload
        })
      });
      setConn(true, "已连接");
    }catch(e){
      console.warn("Cloud sync failed", e);
      setConn(false, "离线");
    }
  }

  const $ = (id)=>document.getElementById(id);
  const fmtEUR = (n)=> new Intl.NumberFormat('es-ES',{style:'currency',currency:'EUR'}).format(Number(n||0));
  const money = (n)=> (Math.round((Number(n)||0)*100)/100).toFixed(2);
  function toNumber(x){
    const s = String(x||'').trim().replace(',', '.');
    if(!s) return NaN;
    const n = Number(s);
    return Number.isFinite(n) ? n : NaN;
  }
  function toast(msg){
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toast._tm);
    toast._tm = setTimeout(()=>t.classList.remove('show'), 1200);
  }
  function setConn(ok, label){
    const dot = $('dotConn');
    dot.classList.remove('ok','bad');
    dot.classList.add(ok ? 'ok' : 'bad');
    $('connLabel').textContent = label;
  }

  const STORAGE_CUR = 'POS_MOBILE_CUR_v5';
  let items = [];
  let step = 'qty'; // qty -> price
  let tmpQty = null;

  function loadCur(){
    try{
      const raw = localStorage.getItem(STORAGE_CUR);
      const v = raw ? JSON.parse(raw) : null;
      items = Array.isArray(v?.items) ? v.items : [];
    }catch{ items = []; }
  }
  function saveCur(){ localStorage.setItem(STORAGE_CUR, JSON.stringify({ items })); }

  function calc(){
    let total = 0, sumQty = 0;
    for(const it of items){
      total += Number(it.amount||0);
      sumQty += Number(it.qty||0);
    }
    return { total, sumQty, kinds: items.length };
  }

  function render(){
    const { total, sumQty } = calc();
    $('kTotal').textContent = fmtEUR(total);
    $('kPieces').textContent = String(sumQty);

    const list = $('list');
    list.innerHTML = '';
    $('emptyHint').style.display = items.length ? 'none' : 'block';

    items.forEach((it, idx) => {
      const row = document.createElement('div');
      row.className = 'it';
      row.innerHTML = `
        <div class="lineRow">
          <div class="lName">Ropa ${idx+1}</div>
          <div class="lMid">${it.qty}×€${money(it.price)}</div>
          <div class="lAmt">€${money(it.amount)}</div>
          <button class="xDel" aria-label="删除" data-del="${idx}">✕</button>
        </div>
      `;
      list.appendChild(row);
    });

    list.querySelectorAll('button[data-del]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const i = Number(btn.getAttribute('data-del'));
        

if(Number.isFinite(i)){
          items.splice(i,1);
          saveCur();
          render();
          toast('已删除');
        }
      });
    });

    // Auto scroll to bottom (ensure latest line visible)
    requestAnimationFrame(()=>{ try{ list.scrollTop = list.scrollHeight; }catch(e){} });

  }

  function setStep(next){
    step = next;
    const entry = $('line');
    if(step === 'qty'){
      entry.placeholder = '...';
    }else{
      entry.placeholder = '输入单价';
    }
    entry.value = '';
  }

  function addItem(qty, price){
    const q = Number(qty);
    const p = Number(price);
    if(!Number.isFinite(q) || q === 0){ toast('Piezas不对'); return false; }
    if(!Number.isFinite(p) || p < 0){ toast('Precio不对'); return false; }
    const amount = Math.round(q*p*100)/100;
    items.push({ qty:q, price:p, amount });
    saveCur();
    render();
    return true;
  }

  function handleEnter(){
    const raw = String($('line').value||'').trim();
    if(!raw) return;
    const n = toNumber(raw);

    if(step === 'qty'){
      if(!Number.isFinite(n) || n === 0){ toast('Piezas不对'); return; }
      tmpQty = n;
      setStep('price');
      toast('输入Precio');
      return;
    }
    if(step === 'price'){
      if(!Number.isFinite(n) || n < 0){ toast('Precio不对'); return; }
      const ok = addItem(tmpQty, n);
      if(ok){
        tmpQty = null;
        setStep('qty');
        toast('Añadido');
      }
      return;
    }
  }

  // ===== Custom keypad =====
  // Active entry element: default main line input; during payment it switches to fPaid.
  let entryEl = null;
  function setEntryTarget(el){
    entryEl = el || $('line');
  }
  function setEntry(v){
    const el = entryEl || $('line');
    el.value = v;
    if(el.id === 'fPaid'){ updateChange(); }
  }
  function getEntry(){
    const el = entryEl || $('line');
    return String(el.value||'');
  }
  function appendChar(ch){
    let v = getEntry();
    if(ch === '.') {
      if(!v) return setEntry('0.');
      if(v.includes('.')) return;
      return setEntry(v + '.');
    }
    if(/^\d$/.test(ch)){
      if(v === '0' && !v.includes('.')) return setEntry(ch);
      if(v === '-0' && !v.includes('.')) return setEntry('-' + ch);
      return setEntry(v + ch);
    }
  }
  function backspace(){
    const v = getEntry();
    if(!v) return;
    setEntry(v.slice(0,-1));
  }
  function clearEntry(){ setEntry(''); }
  function toggleSign(){
    let v = getEntry();
    if(!v) return setEntry('-');
    if(v === '-') return setEntry('');
    if(v.startsWith('-')) return setEntry(v.slice(1));
    return setEntry('-' + v);
  }



// Minus moved next to input: safer, harder to mis-tap.
const btnMinus = document.getElementById('btnMinus');
if(btnMinus){
  const onMinus = (e)=>{ e.preventDefault(); toggleSign(); };
  btnMinus.addEventListener('click', onMinus, {passive:false});
  btnMinus.addEventListener('touchstart', onMinus, {passive:false});
}  const keypadEl = $('keypad');
  // Sync keypad height to CSS so content & payment sheet reserve space
  function syncKeypadHeight(){
    try{
      const h = Math.round(keypadEl.getBoundingClientRect().height);
      if(h>0) document.documentElement.style.setProperty('--kpH', h + 'px');
    }catch(e){}
  }
  window.addEventListener('resize', syncKeypadHeight);
  setTimeout(syncKeypadHeight, 0);
  function onKey(e){
    const b = e.target.closest('button');
    if(!b) return;
    const k = b.getAttribute('data-k');
    if(!k) return;
    e.preventDefault();

    if(k === 'bk') return backspace();
    if(k === 'c') return clearEntry();
    if(k === 'dot') return appendChar('.');
    // during payment, disable sign toggle and use OK/+ to confirm payment
    const inPay = (entryEl && entryEl.id === 'fPaid' && mask.style.display === 'flex');
    if(inPay){
      if(k === 'plus' || k === 'ok') return $('btnSaveNoPrint').click();
      if(k === 'minus') return; // no negative paid
    }
    if(k === 'minus') return toggleSign();
    if(k === 'plus') return handleEnter(); // qty: next step
    if(k === 'ok') return handleEnter();   // price: confirm add
    return appendChar(k);
  }
  keypadEl.addEventListener('click', onKey, {passive:false});
  keypadEl.addEventListener('touchstart', onKey, {passive:false});

  // ===== Checkout =====
  const mask = $('mask');
  function openPay(){
    const { total } = calc();
    if(total === 0){ toast('没有Artículo'); return; }
    $('fTotal').value = money(total);
    $('fPaid').value = '';
    $('fChange').textContent = '0.00';
    mask.style.display = 'flex';
    setTimeout(()=>{ $('fPaid').focus(); $('fPaid').select(); }, 0);
  }
  function closePay(){ mask.style.display = 'none'; setEntryTarget($('line')); }
  function updateChange(){
    const total = toNumber($('fTotal').value);
    const paid = toNumber($('fPaid').value);
    if(!Number.isFinite(paid)){ $('fChange').textContent = '0.00'; return; }
    $('fChange').textContent = money(paid - total);
  }
  function billNoFromDate(d){
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const da = String(d.getDate()).padStart(2,'0');
    const hh = String(d.getHours()).padStart(2,'0');
    const mm = String(d.getMinutes()).padStart(2,'0');
    const ss = String(d.getSeconds()).padStart(2,'0');
    return `${y}${m}${da}-${hh}${mm}${ss}`;
  }
  function buildPayload(paidOverride){
    const { total, sumQty, kinds } = calc();
    const now = new Date();
    const billNo = billNoFromDate(now);
    const paid = Number.isFinite(paidOverride) ? paidOverride : total;
    const change = paid - total;
    return {
      ts: now.toLocaleString('es-ES'),
      billNo,
      items: items.map((it,i)=>({ name:`Artículo ${i+1}`, qty:it.qty, price:it.price, amount:it.amount })),
      total, paid, change, sumQty, kinds
    };
  }

  function receiptText(payload){
    const p = payload;
    const lines = [];
    lines.push('MI ANGELITO MODA');
    lines.push(`Ticket Nº: ${p.billNo}`);
    lines.push(`Fecha: ${p.ts}`);
    lines.push('');
    lines.push('Detalle:');
    (p.items||[]).forEach((it, idx)=>{
      const q = String(it.qty);
      const pr = money(it.price);
      const am = money(it.amount);
      lines.push(`${idx+1}. ${it.name}  ${q} × ${pr}  = ${am}`);
    });
    lines.push('');
    lines.push(`Piezas: ${p.sumQty}`);
    lines.push(`Total: € ${money(p.total)}`);
    if(Number.isFinite(p.paid)) lines.push(`Pagado: € ${money(p.paid)}`);
    if(Number.isFinite(p.change)) lines.push(`Cambio: € ${money(p.change)}`);
    return lines.join('\n');
  }

  function receiptHtml(payload){
    const esc = (s)=>String(s??'').replace(/[&<>"']/g,(c)=>({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
    const p = payload;
    const rows = (p.items||[]).map((it,idx)=>{
      return `<tr><td>${idx+1}</td><td>${esc(it.name)}</td><td style="text-align:right">${esc(it.qty)}</td><td style="text-align:right">€ ${money(it.price)}</td><td style="text-align:right">€ ${money(it.amount)}</td></tr>`;
    }).join('');
    return `<!doctype html><html><head><meta charset="utf-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1" />
      <title>Receipt</title>
      <style>
        body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;margin:18px;color:#111}
        h1{font-size:18px;margin:0 0 6px}
        .meta{font-size:12px;color:#555;margin:0 0 12px}
        table{width:100%;border-collapse:collapse;font-size:12px}
        th,td{border-bottom:1px solid #ddd;padding:6px 4px;vertical-align:top}
        th{font-size:11px;color:#555;text-align:left}
        .sum{margin-top:12px;font-size:13px}
        .sum b{font-size:15px}
        @media print{ body{margin:0} }
      </style></head><body>
      <h1>Mi Angelito Moda</h1>
      <div class="meta">Ticket Nº: ${esc(p.billNo)}<br/>Fecha: ${esc(p.ts)}</div>
      <table>
        <thead><tr><th>#</th><th>Artículo</th><th style="text-align:right">Piezas</th><th style="text-align:right">Precio</th><th style="text-align:right">Importe</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="sum">Piezas: <b>${esc(p.sumQty)}</b><br/>Total: <b>€ ${money(p.total)}</b><br/>Pagado: € ${money(p.paid)}<br/>Cambio: € ${money(p.change)}</div>
      <script>setTimeout(()=>{ try{ window.print(); }catch(e){} }, 250);<\/script>
      </body></html>`;
  }

  function openPrint(payload){
    const w = window.open('', '_blank');
    if(!w){ toast('Popup bloqueado'); return; }
    w.document.open();
    w.document.write(receiptHtml(payload));
    w.document.close();
    w.focus();
  }

  function shareWhatsapp(payload){
    const text = receiptText(payload);
    const url = 'https://wa.me/?text=' + encodeURIComponent(text);
    window.open(url, '_blank');
  }
  function finalize(paidOverride, opts={}){
    const { total } = calc();
    if(total === 0) return;
    const paid = Number.isFinite(paidOverride) ? paidOverride : (total > 0 ? total : 0);
    const payload = buildPayload(paid);
    // cache last bill for sharing / printing
    lastBill = payload;
    try{ localStorage.setItem('pos_last_bill', JSON.stringify(payload)); }catch(e){}

    syncBillToCloud(payload);
    items = [];
    saveCur();
    render();
    tmpQty = null;
    setStep('qty');
    closePay();
    toast('Cobrado');

    if(opts.print){
      // must be triggered by user gesture; we call immediately after click handler
      openPrint(payload);
    }
  }

  $('btnUndo').addEventListener('click', ()=>{
    if(!items.length) return toast('Nada que deshacer');
    items.pop(); saveCur(); render(); toast('Deshecho');
  });
  // long press clear
  let __clearTm = null;
  $('btnClear').addEventListener('touchstart', ()=>{
    if(!items.length) return;
    __clearTm = setTimeout(()=>{
      items = []; saveCur(); render(); tmpQty=null; setStep('qty'); toast('Vaciado');
    }, 900);
  }, {passive:true});
  $('btnClear').addEventListener('touchend', ()=>{ if(__clearTm){clearTimeout(__clearTm);__clearTm=null;} });
  $('btnClear').addEventListener('click', ()=>{ if(items.length) toast('Mantén 1s para vaciar'); else toast('Ya está vacío'); });
  $('btnPay').addEventListener('click', openPay);

  $('btnClose').addEventListener('click', closePay);
  mask.addEventListener('click', (e)=>{ if(e.target === mask) closePay(); });
  $('fPaid').addEventListener('input', updateChange);
  $('btnExact').addEventListener('click', ()=>{
    const total = toNumber($('fTotal').value);
    $('fPaid').value = money(total > 0 ? total : 0);
    updateChange();
    $('fPaid').focus(); $('fPaid').select();
  });
  $('btnSaveNoPrint').addEventListener('click', ()=>{
    const total = toNumber($('fTotal').value);
    const raw = String($('fPaid').value||'').trim();
    const paid = raw ? toNumber(raw) : (total > 0 ? total : 0);
    if(!Number.isFinite(paid)) return toast('Pagado不对');
    finalize(paid, {print:false});
  });
  $('btnSave').addEventListener('click', ()=>{
    const total = toNumber($('fTotal').value);
    const raw = String($('fPaid').value||'').trim();
    const paid = raw ? toNumber(raw) : (total > 0 ? total : 0);
    if(!Number.isFinite(paid)) return toast('Pagado不对');
    // 手机端打印：弹出新窗口 -> AirPrint/保存为PDF
    finalize(paid, {print:true});
  });

  // Share bill (WhatsApp)
  const btnShare = document.getElementById('btnShareBill');
  if(btnShare){
    btnShare.addEventListener('click', (e)=>{
      e.preventDefault();
      if(!lastBill){ toast('请先Cobro入账，再Enviar WhatsApp'); return; }
      shareWhatsapp(lastBill);
    });
  }

  // init
  loadCur();
  render();
  
  // Fallback auto-scroll for iOS: watch list changes
  try{
    const __list = document.getElementById('list');
    if(__list){
      const obs = new MutationObserver(()=>{ requestAnimationFrame(()=>{ __list.scrollTop = __list.scrollHeight; }); });
      obs.observe(__list, { childList:true, subtree:true });
    }
  }catch(e){}
setStep('qty');
  setConn(false,'未连接');
  toast("v6 listo");
  const d=document.getElementById("lineDisplay"); if(d && !d.textContent) d.textContent="";
})();</script>
</body>
</html>
